<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <style>
    body {
    font-family:droid serif;
    background-image: url(download\ \(16\).jpg);
    background-size: cover; 
    background-position: center; 
    background-repeat: no-repeat; 
    background-attachment: fixed; 
    margin: 10;
    padding: 10;
    border-radius: 10px;
    border: #a978c5;
}

form {
    width: 400px;
    margin: 20px auto;
    background: rgb(230, 195, 215);
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    color: #000000;
}

label {
    font-weight: bold;
    display: block;
    margin-top: 12px;
    color: #000000;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: 1px solid #a978c5;
    border-radius: 6px;
    box-sizing: border-box;
}

button {
    width: 100%;
    background-color: #88068f;
    color: white;
    padding: 12px;
    margin-top: 20px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 21px;
    font-family: droid serif;
}

button:hover {
    background-color: #88068f;
}
.sexo {
    text-align: center;
    margin: 20px 0;
}

.opcoes-sexo {
    display: flex;
    justify-content: center;
    gap: 30px; /* espaço entre opções */
    margin-top: 10px;
}

.opcoes-sexo label {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 18px;
    font-weight: bold;
}

input[type="radio"] {
    transform: scale(1.2); /* aumenta a bolinha */
}
</style>
</head>
<body>
    <form action= "https://sheetdb.io/api/v1/0tiwqeybbe8g3" method="POST">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="data[nome]" required><br><br>

        <label for="data_nascimento">Data de Nascimento</label>
        <input type="date" id="date" name="data[date]" required><br><br>

        <label for="email">E-mail</label>
        <input type="email" id="email" name="data[email]" required><br><br>

        <label for="cpf">CPF</label>
        <input type="text" id="cpf" name="data[cpf]" required><br><br>

        <label for="telefone">Telefone</label>
        <input type="tel" id="telefone" name="data[telefone]" required><br><br>

        <label for="endereço">Insira um Endereço</label>
        <input type="endereço" id="endereço" name="data[endereço]" required><br><br>

      <div class="sexo">
    <label>Selecione o sexo:</label>

    <div class="opcoes-sexo">
        <label>
            <input type="radio" name="date[sexo]"> Feminino
        </label>

        <label>
            <input type="radio" name="data[sexo]"> Masculino
        </label>

        <label>
            <input type="radio" name="data[sexo]"> Outro
        </label>
    </div>
</div>
<br>

        <label for="estado">Estado Civil</label>
        <select name="data[estado_civil]" id="estado_civil">
        <option value="solteiro(a)">Solteiro(a)</option>
        <option value="Casado(a)"selected>Casado(a)</option>
        <option value="Divorciado(a)">Divorciado(a)</option>
        <option value="Separado(a)">Separado(a)</option>
        </select><br><br>

        <label for="profissao">Informe sua Profissão</label>
        <input type="profissao" id="profissao" name="data[profissao]" required><br><br>

        <label for="nacionalidade">Nacionalidade</label>
        <input type="nacionalidade" id="nacionalidade" name="data[nacionalidade]" required><br><br>

        <button type="submit" id="premio">Envie Seus dados</button>
         
    </form>
    <script src="escripit.js">

    </script>
    
</body>
</html>
